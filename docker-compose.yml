services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html/src
      - ./public:/var/www/html/public
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hub_marketplace
      DB_USER: postgres
      DB_PASS: postgres
      MARKETPLACE_API_URL: https://www.replicade.com.br/api/v1
      MARKETPLACE_API_TOKEN: "Basic aXdPMzVLZ09EZnRvOHY3M1I6"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hub_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations.sql:/docker-entrypoint-initdb.d/migrations.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hub_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
